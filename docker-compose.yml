version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED: Copy .env.example to .env and fill in every value before running.
# docker-compose automatically reads .env from the project root for variable
# substitution below. It does NOT mount .env into any container.
# ─────────────────────────────────────────────────────────────────────────────

services:

  mongodb:
    image: mongo:7.0
    container_name: ida-mongodb
    restart: always
    expose:
      - "27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ida-network

  ollama:
    image: ollama/ollama:latest
    container_name: ida-ollama
    restart: always
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ida-network
    deploy:
      resources:
        limits:
          memory: 8G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ida-backend
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ida
      - MONGO_DB_NAME=ida
      - OLLAMA_BASE_URL=http://ollama:11434
      - API_PORT=8000
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - SUPPORTED_LANGUAGES=en,hi,mr
      - WHISPER_MODEL=base
    volumes:
      - whisper_cache:/home/app/.cache
    depends_on:
      mongodb:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - ida-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    container_name: ida-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ida-network

volumes:
  mongodb_data:
  ollama_data:
  whisper_cache:

networks:
  ida-network:
    driver: bridge